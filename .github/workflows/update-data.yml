name: Update tracker data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch official source pages
        run: |
          python ai_tracker_package/fetch_sources.py

      - name: Rebuild events payload
        run: |
          python ai_tracker_package/build_events.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/events.json ai_tracker_package/raw_pages ai_tracker_package/raw_pages_manifest.json || true
          git diff --cached --quiet || git commit -m "Auto-update tracker data"
          git push
